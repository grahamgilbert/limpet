name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write   # release creation + appcast.xml commit back

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so `git rev-list --count` is monotonic

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          xcode_app="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n1 || true)"
          if [ -z "$xcode_app" ]; then
            xcode_app="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$xcode_app/Contents/Developer"
          xcodebuild -version

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Build Release
        run: |
          set -euo pipefail
          # Version is read from VERSION by scripts/stamp_version.sh, run as a
          # build phase, so we don't need to override MARKETING_VERSION here.
          xcodebuild \
            -project limpet.xcodeproj \
            -scheme limpet \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            build

      - name: Locate built app
        id: app
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release -name 'limpet.app' -maxdepth 2 -type d | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "limpet.app not found" >&2
            ls -R build/Build/Products/Release || true
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          codesign -dv "$APP_PATH"

      - name: Re-sign nested binaries + app
        run: |
          set -euo pipefail
          APP="${{ steps.app.outputs.app_path }}"
          IDENTITY="Developer ID Application"
          ENTITLEMENTS="limpet/limpet.entitlements"

          # 1. Re-sign every nested executable inside Sparkle.framework first
          #    (Sparkle ships pre-signed dev binaries that need to be rewritten
          #    with our Developer ID + Apple timestamp + hardened runtime).
          while IFS= read -r f; do
            echo "Re-signing nested: $f"
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$f"
          done < <(find "$APP/Contents/Frameworks" \( \
              -name '*.dylib' -o -name '*.framework' -o \
              \( -type f -perm -u+x ! -name '*.plist' ! -name '*.nib' \) \
            \) -print)

          # 2. Re-sign Sparkle's embedded helper apps as a unit.
          for nested_app in $(find "$APP/Contents/Frameworks" -name '*.app' -type d); do
            echo "Re-signing nested app: $nested_app"
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$nested_app"
          done

          # 3. Re-sign Sparkle.framework itself.
          for fw in "$APP/Contents/Frameworks/"*.framework; do
            echo "Re-signing framework: $fw"
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$fw"
          done

          # 4. Finally, re-sign limpet.app with the entitlements file. This
          #    overwrites any debug entitlements (get-task-allow) that may
          #    have been baked in.
          echo "Re-signing main app: $APP"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvvv --entitlements - "$APP"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="${{ steps.app.outputs.app_path }}"
          ZIP="build/limpet-notarize.zip"
          /usr/bin/ditto -c -k --keepParent "$APP" "$ZIP"
          # Capture submission ID and exit status; if Invalid, dump the log.
          SUBMIT_OUT="$(xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"
          echo "$SUBMIT_OUT"
          STATUS="$(echo "$SUBMIT_OUT" | python3 -c 'import json, sys; print(json.load(sys.stdin)["status"])')"
          ID="$(echo "$SUBMIT_OUT" | python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])')"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::notarization status=$STATUS"
            echo "Fetching detailed log for $ID:"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package DMG
        run: |
          set -euo pipefail
          APP="${{ steps.app.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG="limpet-$VERSION.dmg"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "limpet" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          codesign --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          ls -la "$DMG"

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: limpet-*.dmg

      - name: Locate sign_update and prepare key file
        id: sparkle_tools
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SIGN_UPDATE=""
          while IFS= read -r c; do
            case "$c" in
              *old_dsa*) continue ;;
              *) SIGN_UPDATE="$c"; break ;;
            esac
          done < <(find build ~/Library/Developer/Xcode/DerivedData /Users/runner -maxdepth 8 -name sign_update -type f -perm -u+x 2>/dev/null)

          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::sign_update binary not found"
            find build -maxdepth 8 -name 'sign_update*' 2>/dev/null || true
            exit 1
          fi
          echo "Using $SIGN_UPDATE"
          echo "sign_update=$SIGN_UPDATE" >> "$GITHUB_OUTPUT"

          KEY_FILE="$(mktemp)"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          echo "key_file=$KEY_FILE" >> "$GITHUB_OUTPUT"

      - name: Sign DMG with Sparkle key
        id: sparkle_sign
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG="limpet-$VERSION.dmg"
          SIGN_UPDATE="${{ steps.sparkle_tools.outputs.sign_update }}"
          KEY_FILE="${{ steps.sparkle_tools.outputs.key_file }}"

          set +e
          SIG_OUT="$("$SIGN_UPDATE" --ed-key-file "$KEY_FILE" "$DMG" 2>&1)"
          SIG_RC=$?
          set -e
          echo "sign_update rc=$SIG_RC"
          echo "sign_update output: $SIG_OUT"
          if [ "$SIG_RC" -ne 0 ]; then
            echo "::error::sign_update failed"
            exit "$SIG_RC"
          fi
          {
            echo "sig_output<<EOF"
            echo "$SIG_OUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update and sign appcast.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG="limpet-$VERSION.dmg"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/$DMG"
          PUB_DATE="$(LC_ALL=en_US.UTF-8 date -u '+%a, %d %b %Y %H:%M:%S %z')"
          SIG_LINE="${{ steps.sparkle_sign.outputs.sig_output }}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/v$VERSION"
          SIGN_UPDATE="${{ steps.sparkle_tools.outputs.sign_update }}"
          KEY_FILE="${{ steps.sparkle_tools.outputs.key_file }}"

          python3 scripts/update_appcast.py \
            --appcast appcast-prerelease.xml \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --url "$DMG_URL" \
            --pub-date "$PUB_DATE" \
            --signature "$SIG_LINE" \
            --release-notes-url "$NOTES_URL"

          "$SIGN_UPDATE" --ed-key-file "$KEY_FILE" --disable-signing-warning appcast-prerelease.xml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add appcast-prerelease.xml
          git commit -m "Update prerelease appcast for v$VERSION"
          git push origin HEAD:main

      - name: Clean up key file
        if: always()
        run: rm -f "${{ steps.sparkle_tools.outputs.key_file }}"
