name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          xcode_app="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n1 || true)"
          if [ -z "$xcode_app" ]; then
            xcode_app="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$xcode_app/Contents/Developer"
          xcodebuild -version

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v2.0.0
        with:
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Build Release
        run: |
          set -euo pipefail
          xcodebuild \
            -project limpet.xcodeproj \
            -scheme limpet \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            build

      - name: Locate built app
        id: app
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release -name 'limpet.app' -maxdepth 2 -type d | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "limpet.app not found" >&2
            ls -R build/Build/Products/Release || true
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          codesign -dv "$APP_PATH"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="${{ steps.app.outputs.app_path }}"
          ZIP="build/limpet-notarize.zip"
          /usr/bin/ditto -c -k --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package DMG
        run: |
          set -euo pipefail
          APP="${{ steps.app.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG="limpet-$VERSION.dmg"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "limpet" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          codesign --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          ls -la "$DMG"

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@afdcb9470aebdb2252c0c95a1c130723c9e21f3a # v4.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}
          reverse: 'true'

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v0.1.15
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            # What's Changed
            ${{ steps.changelog.outputs.changelog }}
          files: limpet-*.dmg
