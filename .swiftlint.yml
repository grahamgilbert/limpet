included:
  - limpet
  - limpetTests

excluded:
  - build
  - DerivedData
  - .build
  - .swiftpm

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - redundant_nil_coalescing
  - explicit_init
  - closure_spacing
  - operator_usage_whitespace
  - prefer_zero_over_explicit_init
  - convenience_type
  - discouraged_optional_boolean
  - empty_collection_literal
  - implicit_return
  - private_action
  - private_outlet
  - prohibited_super_call
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - todo
  - identifier_name
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - nesting
  - trailing_comma
  - large_tuple

type_name:
  min_length: 2          # allow `AX` namespace
  max_length:
    warning: 60
    error: 80
  excluded:
    - limpetApp           # @main lowercased per Apple template

trailing_whitespace:
  ignores_empty_lines: true

reporter: emoji
